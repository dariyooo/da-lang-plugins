name: Create Release

# Cuts a version-pinned release of the default pack: tags this commit (freezing
# every script) and publishes a manifest whose codeUrls resolve against that tag.
# Download the attached dalang_default_pack.dapp and upload it to the matching
# handcrafted DaKanji-Data release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pin (e.g. 4.0.1). Tags this commit as v<version> and freezes the default-pack scripts at it.'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pinned default-pack manifest
        run: python3 scripts/build-release-manifest.py default "v${{ inputs.version }}"

      - name: Publish release with pinned manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: false
          body: |
            Default-pack manifest pinned to tag `v${{ inputs.version }}`.

            Every `codeUrl` resolves against this tag, so the scripts this release
            installs are frozen at this commit. `updateUrl` still points at `main`,
            so the in-app store can update past this version.

            Upload `dalang_default_pack.dapp` to the matching DaKanji-Data release.
          files: dist/dalang_default_pack.dapp
